# Polycrawler config. Phase 0 locks the alignment decisions; later phases fill blanks.
sport: soccer

# --- History: fit + leak-free backtest. Calibration is PROVEN here (many resolved games). ---
history:
  provider: football-data.co.uk          # free CSVs, decades of leagues + closing odds, no key
  leagues: [E0]                          # E0 = English Premier League (football-data.co.uk code)
  seasons: ["2021-2022", "2022-2023", "2023-2024", "2024-2025"]
  odds_columns: { home: B365H, draw: B365D, away: B365A }   # -> de-vig to implied prob

# --- Live: real-time ingestion + forward paper-trading. Inherently leak-free (game hasn't happened). ---
live:
  competition: fifa-world-cup-2026
  market_source: polymarket              # read-only public prices only; NO trading

# --- Pluggable collectors (Phase 1). Any source can be disabled. ---
sources:
  reddit:
    enabled: true
    subreddits: [soccer]                 # OAuth app required; ~100 req/min, free non-commercial
    limit: 100                           # newest N submissions per subreddit per run
  news_rss:
    enabled: true
    feeds:
      - https://www.theguardian.com/football/rss
      - https://feeds.bbci.co.uk/sport/football/rss.xml
  polymarket:
    enabled: true                        # live market-implied prob (read-only public API)
  football_data_couk:
    enabled: true                        # historical results + closing odds (CSV)

storage:
  duckdb_path: data/polycrawler.duckdb
  parquet_dir: data/parquet

vector_store:
  provider: qdrant
  url: http://localhost:6333          # Docker server (optional)
  path: data/qdrant_local             # local in-process mode (no Docker; used by default)

# Hosted embeddings (Phase 3). nv-embedqa-e5-v5 = 1024-dim, English, needs input_type.
embeddings:
  provider: nvidia
  base_url: https://integrate.api.nvidia.com/v1
  api_key_env: NVIDIA_API_KEY
  model: nvidia/nv-embedqa-e5-v5
  dim: 1024
  truncate: END
  batch_size: 64
  cache_dir: data/emb_cache

retrieval:
  top_k: 8
  candidate_k: 50
  recency_halflife_days: 3
  credibility:        # source-substring -> weight, for the recency x credibility re-rank
    default: 0.5
    bbc: 0.9
    theguardian: 0.85
    reddit: 0.4

# Hosted LLM (Phase 2+). Provider-agnostic, OpenAI-compatible. Confirm ids vs docs.
llm:
  provider: nvidia
  base_url: https://integrate.api.nvidia.com/v1   # confirm vs build.nvidia.com docs
  api_key_env: NVIDIA_API_KEY
  extract_model: meta/llama-3.3-70b-instruct      # bulk extraction; confirm current id
  reason_model: deepseek-ai/deepseek-r1           # optional, ambiguous cases
  temperature: 0.0
  max_tokens: 1024
  max_retries: 3
  cache_dir: data/llm_cache

extraction:
  signals_version: v1
  prefilter:
    kinds: [social, news]
    min_chars: 24
    keywords:                # >=1 must appear (relevance + cheap language gate)
      - injur
      - hamstring
      - knock
      - strain
      - ruled out
      - doubt
      - fitness
      - sidelined
      - available
      - suspend
      - ban
      - lineup
      - starting xi
      - out for
      - miss
      - return
      - transfer
      - manager
      - sack
      - recover
      - illness

# Point-in-time correctness: features may only use observations with ts < kickoff.
timing:
  strict_before_kickoff: true

# Placeholders used from Phase 4+; values here don't bind anything yet.
thresholds:
  min_edge: 0.02
  kelly_fraction: 0.25                   # fractional Kelly (Phase 6)
