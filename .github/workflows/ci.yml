name: ci
on:
  push: { branches: [main] }
  pull_request: {}

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: "latest" }
      - run: uv sync
      # Full suite, incl. the leakage suite and the calibration-gate test that
      # FAILS on a deliberately worse model.
      - name: Tests (incl. leakage + eval gate)
        run: uv run pytest -q
      # The gate as a CI step: a precomputed candidate equal to the committed
      # baseline must PASS. A calibration regression here turns the build red.
      - name: Calibration eval gate
        run: uv run python -m eval.gate --metrics-file eval/baseline_metrics.json

  eval-gate-demo:
    # Asserts the gate BLOCKS a deliberately worse model. The gate exits 1 when it
    # correctly blocks, so we invert it: this job is GREEN when the gate works, and
    # RED only if a calibration regression slips through.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: "latest" }
      - run: uv sync
      - name: Gate must block a worse model
        run: |
          if uv run python -m eval.gate --simulate-regression; then
            echo "::error::eval gate did NOT block a deliberately worse model"
            exit 1
          fi
          echo "eval gate correctly blocked the regression (exit 1) — OK"
